name: Build

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux
          - goos: linux
            goarch: amd64
            os: ubuntu-latest
            artifact: tunnneji-tail-linux-amd64
          - goos: linux
            goarch: arm64
            os: ubuntu-latest
            artifact: tunnneji-tail-linux-arm64
          - goos: linux
            goarch: arm
            os: ubuntu-latest
            artifact: tunnneji-tail-linux-arm
          - goos: linux
            goarch: "386"
            os: ubuntu-latest
            artifact: tunnneji-tail-linux-386
          # Windows
          - goos: windows
            goarch: amd64
            os: windows-latest
            artifact: tunnneji-tail-windows-amd64.exe
          - goos: windows
            goarch: arm64
            os: windows-latest
            artifact: tunnneji-tail-windows-arm64.exe
          # macOS
          - goos: darwin
            goarch: amd64
            os: macos-latest
            artifact: tunnneji-tail-darwin-amd64
          - goos: darwin
            goarch: arm64
            os: macos-latest
            artifact: tunnneji-tail-darwin-arm64

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Build
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
      run: go build -v -trimpath -tags "ts_omit_systray,ts_omit_webclient,ts_omit_webbrowser,ts_omit_qrcodes,ts_omit_colorable,ts_omit_desktop_sessions,ts_omit_completion,ts_omit_completion_scripts,ts_omit_drive" -ldflags="-s -w" -o ${{ matrix.artifact }} ./cmd/tunnneji-tail

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact }}
        path: ${{ matrix.artifact }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true

    - name: Create draft release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        TAG="${GITHUB_REF#refs/tags/}"
        gh release create "$TAG" artifacts/* \
          --draft \
          --generate-notes \
          --title "$TAG"
