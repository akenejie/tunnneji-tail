name: Build

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux
          - goos: linux
            goarch: amd64
            os: ubuntu-latest
            artifact: tunnneji-tail-linux-amd64
          - goos: linux
            goarch: arm64
            os: ubuntu-latest
            artifact: tunnneji-tail-linux-arm64
          - goos: linux
            goarch: arm
            os: ubuntu-latest
            artifact: tunnneji-tail-linux-arm
          - goos: linux
            goarch: "386"
            os: ubuntu-latest
            artifact: tunnneji-tail-linux-386
          # Windows
          - goos: windows
            goarch: amd64
            os: windows-latest
            artifact: tunnneji-tail-windows-amd64.exe
          - goos: windows
            goarch: arm64
            os: windows-latest
            artifact: tunnneji-tail-windows-arm64.exe
          # macOS
          - goos: darwin
            goarch: amd64
            os: macos-latest
            artifact: tunnneji-tail-darwin-amd64
          - goos: darwin
            goarch: arm64
            os: macos-latest
            artifact: tunnneji-tail-darwin-arm64

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Build
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
      run: go build -v -trimpath -tags "ts_omit_systray,ts_omit_webclient,ts_omit_webbrowser,ts_omit_qrcodes,ts_omit_colorable,ts_omit_desktop_sessions,ts_omit_completion,ts_omit_completion_scripts,ts_omit_drive" -ldflags="-s -w" -o ${{ matrix.artifact }} ./cmd/tunnneji-tail

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact }}
        path: ${{ matrix.artifact }}

  release:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true

    - name: Delete previous draft release
      if: "!startsWith(github.ref, 'refs/tags/')"
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        PREV=$(gh release list --json tagName,isDraft -q '.[] | select(.isDraft) | .tagName' | head -1)
        if [ -n "$PREV" ]; then
          gh release delete "$PREV" --yes
        fi

    - name: Create draft release (tag)
      if: startsWith(github.ref, 'refs/tags/')
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        TAG="${GITHUB_REF#refs/tags/}"
        gh release create "$TAG" artifacts/* \
          --draft \
          --generate-notes \
          --title "$TAG"

    - name: Create draft release (commit)
      if: "!startsWith(github.ref, 'refs/tags/')"
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
        LATEST_TAG=$(gh release list --json tagName -q '.[0].tagName' 2>/dev/null || echo "")
        if [ -n "$LATEST_TAG" ] && echo "$LATEST_TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
          BASE=$(echo "$LATEST_TAG" | sed 's/^v//')
          MAJOR=$(echo "$BASE" | cut -d. -f1)
          MINOR=$(echo "$BASE" | cut -d. -f2)
          PATCH=$(echo "$BASE" | cut -d. -f3)
          NEXT_PATCH=$((PATCH + 1))
          NEXT_VERSION="v${MAJOR}.${MINOR}.${NEXT_PATCH}-beta.${SHORT_SHA}"
        else
          NEXT_VERSION="v0.0.0-beta.${SHORT_SHA}"
        fi
        gh release create "${NEXT_VERSION}" artifacts/* \
          --draft \
          --prerelease \
          --generate-notes \
          --title "${NEXT_VERSION}"
